name: Build Release APK

on:
  push:
    branches: [ "master" ]

jobs:
  build-release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Generate Dummy Keystore
      run: |
        keytool -genkeypair -v -keystore dummy.keystore -alias dummyAlias -keyalg RSA -keysize 2048 -validity 10000 -storepass dummyPassword -keypass dummyPassword -dname "CN=FlowState, O=Dummy, C=US"

    - name: Update Version Code and Version Name
      run: |
        # Append run number to the end of versionName (adding 1 at the end each time)
        sed -i "s/versionName = \"\(.*\)\"/versionName = \"\1.${{ github.run_number }}\"/g" app/build.gradle.kts
        # Set versionCode to the run number
        sed -i "s/versionCode = \(.*\)/versionCode = ${{ github.run_number }}/g" app/build.gradle.kts
        # Display the updated defaultConfig block to verify changes
        git diff app/build.gradle.kts || true

    - name: Build Release APK
      run: ./gradlew :app:assembleRelease

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/app-release.apk
