name: Run tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
  
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # 'testDebugUnitTest' runs only the unit tests (fast) for the Debug variant
    # If instrumented tests (UI) were implemented, they would be configured differently
    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest

    # Upload test results to the GitHub interface
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: '**/build/test-results/testDebugUnitTest/**.xml'
